name: Crystal Ameba

on:
  push:
    paths:
      - "**/*.cr"
  pull_request:
    paths:
      - "**/*.cr"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Download source
        uses: actions/checkout@v6

      - name: Run Ameba Linter
        uses: crystal-ameba/github-action@master
